<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Study Quest - Login</title>
</head>

<body style="margin:0; font-family: Arial, sans-serif;">

<!-- CENTER PAGE -->
<div style="display: flex; justify-content: center; align-items: center; height: 100vh;">

  <!-- MAIN BOX -->
  <div style="width: 800px; display: flex; border: 1px solid black;">

    <!-- LEFT SIDE -->
    <div style="width: 33%; border-right: 1px solid black; padding: 30px;">
      <h2>Study Quest</h2>
      <p>Track your study tasks, gain XP, and level up.</p>
    </div>

    <!-- RIGHT SIDE (FORM) -->
    <div style="width: 67%; padding: 40px; display: flex; justify-content: center; align-items: center;">

      <div style="width: 100%; max-width: 300px;">

        <h3 style="text-align: center;">Login</h3>

        <form>

          <div style="margin-bottom: 15px;">
            <label>Username</label><br>
            <input type="text" style="width: 100%;">
          </div>

          <div style="margin-bottom: 15px;">
            <label>Password</label><br>
            <input type="password" style="width: 100%;">
          </div>

          <div style="margin-bottom: 15px;">
            <button style="width: 100%;">Login</button>
          </div>

        </form>

        <p style="text-align: center;">
          No account?
          <a href="#">Sign up</a>
        </p>

      </div>

    </div>

  </div>

</div>

</body>
</html>
