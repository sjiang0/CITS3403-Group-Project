<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Study Quest - Dashboard</title>
</head>

<body style="margin:0; font-family: Arial, sans-serif;">

<!-- CONTAINER -->
<div style="display: flex; min-height: 100vh;">

  <!-- SIDEBAR -->
  <aside style="width: 250px; border-right: 1px solid black; padding: 20px; display: flex; flex-direction: column; justify-content: space-between;">

    <div>
      <h2>Study Quest</h2>

      <!-- CREATE QUEST -->
      <div style="margin-bottom: 20px;">
        <button style="width: 100%;">+ Create Quest</button>
      </div>

      <!-- NAV -->
      <nav>
        <p>Dashboard</p>
        <p>Quests</p>
        <p>Leaderboard</p>
        <p>Profile</p>
      </nav>
    </div>

    <div>
      <p>Logout</p>
    </div>

  </aside>

  <!-- MAIN CONTENT -->
  <main style="flex: 1; padding: 30px; max-width: 900px; margin: auto;">
          <!-- USER INFO -->
      <div style="position:fixed; right:50px; top:50px; background-color: lighblue; margin:auto">
        <p><strong>Username</strong></p>
        <p>Level 3</p>
        <p>120 / 200 XP</p>
      </div>

    <!-- FLOATING BUTTON -->
    <div style="position: fixed; bottom: 20px; right: 20px;">
      <button>+ Create Quest</button>
    </div>

    <h2>Dashboard</h2>

    <!-- XP SECTION -->
    <section style="border: 1px solid black; padding: 15px; margin-bottom: 20px;">
      <p>Level 3</p>

      <!-- XP BAR -->
      <div style="border: 1px solid black; height: 10px; width: 100%; margin: 10px 0;">
        <div style="width: 66%; height: 100%; background: black;"></div>
      </div>

      <p>120 / 200 XP</p>
    </section>

    <!-- QUESTS -->
    <section style="border: 1px solid black; padding: 15px; margin-bottom: 20px;">
      <h3>Active Quests</h3>

      <ul>
        <li>Labwork — [Easy]</li>
        <li>Essay draft — [Medium]</li>
        <li>Study for midsem test — [Hard]</li>
      </ul>
    </section>
  </main>

</div>

</body>
</html>
